<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maratourist</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1162d6;
    --blue-dark:  #0d4ba8;
    --blue-pale:  #eaf1fc;
    --bg:         #f4f6f9;
    --card:       #ffffff;
    --border:     #dde3ec;
    --text:       #1c2733;
    --muted:      #6b7785;
    --run:        #e2622e;
    --parkrun:    #7c5cd6;
    --travel:     #1162d6;
    --green:      #1a9c6b;
    --shadow:     0 1px 3px rgba(20,30,50,0.06), 0 1px 2px rgba(20,30,50,0.04);
    --shadow-hover: 0 6px 18px rgba(20,30,50,0.10), 0 2px 6px rgba(20,30,50,0.06);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 16px 40px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .logo-icon {
    font-size: 28px;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .logo-wordmark {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .logo-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
    background: linear-gradient(135deg, #e8541a, #c73a0a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-transform: none;
    letter-spacing: 0.1px;
    font-family: 'Inter', sans-serif;
    -webkit-text-fill-color: var(--muted);
  }
  .logo span { color: var(--blue); }

  .header-stats {
    display: flex;
    gap: 28px;
    justify-self: center;
  }
  .hstat { text-align: center; min-width: 100px; }

  .hstat-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 3px;
    line-height: 1;
  }
  .hstat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .hstat-done {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
  }
  .hstat-pend {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #d03030;
  }
  .hstat-sep {
    font-size: 15px;
    color: var(--border);
    font-weight: 400;
  }
  .hstat-pct {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
    margin-top: 3px;
  }
  .hstat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb span { color: var(--blue); cursor: pointer; font-weight: 500; }
  .breadcrumb span:hover { text-decoration: underline; }
  .breadcrumb .current { color: var(--text); font-weight: 600; }
  .breadcrumb .sep { color: #b8c1cf; }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 32px 40px 60px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .page-header {
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .page-subtitle {
    font-size: 14px;
    color: var(--muted);
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    margin-bottom: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    transition: all 0.15s;
  }
  .back-btn:hover { background: var(--blue-pale); border-color: var(--blue); }

  /* ── REGION GRID (world view) ── */
  .region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .region-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .region-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: var(--blue);
  }
  .region-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: var(--accent-color, var(--blue));
  }

  .region-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .region-emoji { font-size: 32px; }
  .visited-badge {
    background: var(--blue-pale);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .region-card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .region-card-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .region-card-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── COUNTRY / generic square grid ── */
  .square-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .square-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 14px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    box-shadow: var(--shadow);
  }
  .square-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: var(--blue);
  }

  .square-flag {
    font-size: 36px;
    margin-bottom: 10px;
    display: block;
  }
  .square-flag-img-wrap {
    margin-bottom: 10px;
    display: flex;
    justify-content: center;
  }
  .square-flag-img {
    width: 72px;
    height: 48px;
    object-fit: cover;
    border-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    display: block;
  }
  .square-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .square-count {
    font-size: 11px;
    color: var(--muted);
  }

  .tag {
    font-size: 13px;
    padding: 3px 9px;
    border-radius: 5px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .tag-run    { background: #fdf0e9; color: var(--run); }
  .tag-park   { background: #f1edfb; color: var(--parkrun); }
  .tag-travel { background: var(--blue-pale); color: var(--travel); }

  /* ── CITY CARD ── */
  .city-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow);
  }
  .city-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--blue);
  }
  .city-card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .city-card-stats {
    display: flex;
    gap: 14px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .city-card-stat { display: flex; align-items: center; gap: 5px; }

  .city-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  /* ── CATEGORY (Activities / Tourism) ── */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    max-width: 700px;
  }
  .category-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .category-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: var(--blue);
  }
  .category-icon { font-size: 48px; margin-bottom: 14px; }
  .category-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .category-count { font-size: 13px; color: var(--muted); }

  /* ── SUBCATEGORY GRID (Half Marathons/Parkruns or Hotels/Beaches/etc) ── */
  .subcat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .subcat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow);
  }
  .subcat-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: var(--blue);
  }
  .subcat-icon { font-size: 30px; margin-bottom: 10px; }
  .subcat-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .subcat-count { font-size: 11.5px; color: var(--muted); }

  /* ── ENTRY LIST (final level: actual logged items) ── */
  .entry-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .entry-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .entry-icon { font-size: 22px; }
  .entry-info { flex: 1; }
  .entry-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .entry-date { font-size: 12px; color: var(--muted); }
  .entry-result {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--blue);
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .empty-state .es-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state .es-text { font-size: 14px; line-height: 1.6; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin: 28px 0 14px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── ACTION BUTTON (contextual + Add) ── */
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    transition: all 0.15s;
    margin-bottom: 18px;
  }
  .action-btn:hover { background: var(--blue-dark); }
  .action-btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .action-btn-secondary {
    background: var(--card);
    color: var(--blue);
    border: 1px solid var(--border);
  }
  .action-btn-secondary:hover { background: var(--blue-pale); border-color: var(--blue); }

  .hero-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 36px;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 17px;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.3px;
    box-shadow: var(--shadow);
    transition: all 0.18s;
  }
  .hero-cta-btn:hover {
    transform: translateY(-2px);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: var(--shadow-hover);
  }

  .add-result-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--blue-pale);
    color: var(--blue);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    transition: all 0.15s;
  }
  .add-result-btn:hover { background: var(--blue); color: white; }

  /* ── MODAL / FORM OVERLAY ── */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(20,30,50,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
    overflow-y: auto;
  }

  .modal-box {
    background: var(--card);
    border-radius: 12px;
    width: 100%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(20,30,50,0.25);
    margin: auto;
  }

  .modal-header {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--card);
    border-radius: 12px 12px 0 0;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 19px;
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 22px 26px;
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .form-row-5 {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .form-label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-label .optional {
    color: var(--muted);
    font-weight: 400;
    font-size: 11.5px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: 'Barlow', sans-serif;
    color: var(--text);
    background: var(--card);
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--blue);
  }

  .form-section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 22px 0 12px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .form-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }

  .modal-footer {
    padding: 18px 26px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    position: sticky;
    bottom: 0;
    background: var(--card);
    border-radius: 0 0 12px 12px;
  }

  .btn-primary {
    padding: 10px 20px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-cancel {
    padding: 10px 20px;
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }
  .btn-cancel:hover { background: var(--bg); }

  .form-error {
    background: #fdeeee;
    color: #b3261e;
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }

  .location-card-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: var(--shadow);
  }
  .location-card-info { cursor: pointer; flex: 1; }
  .location-card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .location-card-meta { font-size: 11.5px; color: var(--muted); }

  /* ── PARKRUN RANKING TABLE (WCA-style) ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    max-height: 560px;
    box-shadow: var(--shadow);
  }
  .pk-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    table-layout: auto;
  }
  .pk-table th {
    background: var(--bg);
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 12px 14px;
    text-align: center;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
    white-space: nowrap;
  }
  .pk-table th:nth-child(2),
  .pk-table th.pk-th-left {
    text-align: left;
  }
  .pk-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    text-align: center;
    white-space: nowrap;
  }
  .pk-table td.pk-name, .pk-table td.pk-cityname {
    text-align: left;
    min-width: 160px;
  }
  .pk-table td.pk-state {
    text-align: center;
    min-width: 60px;
    max-width: 70px;
  }
  .pk-table tbody tr:last-child td { border-bottom: none; }
  .pk-table tbody tr.pk-done {
    background: #eef9f1;
  }
  .pk-table tbody tr.pk-done:hover { background: #e2f5e8; }
  .pk-table tbody tr.pk-pending {
    background: #fff5f5;
    color: #a03030;
  }
  .pk-table tbody tr.pk-pending:hover { background: #ffe8e8; }
  .pk-table tbody tr { cursor: pointer; transition: background 0.12s; }
  .pk-table td.pk-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }
  .pk-table td.pk-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--blue);
  }
  .pk-table tr.pk-pending td.pk-time { color: var(--muted); font-weight: 400; }
  .pk-table td.pk-km-fast { color: #0d8a4f !important; font-weight: 700 !important; }
  .pk-table td.pk-km-slow { color: #d6342c !important; font-weight: 700 !important; }
  .pk-status-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
  }
  .pk-status-done { background: var(--green); }
  .pk-status-pending { background: #d03030; }
  .pk-add-inline {

async function resizeImage(file, maxW, maxH) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.width, h = img.height;
      const ratio = Math.min(maxW/w, maxH/h, 1);
      w = Math.round(w * ratio); h = Math.round(h * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => resolve(new File([blob], file.name, { type: 'image/jpeg' })), 'image/jpeg', 0.88);
    };
    img.src = url;
  });
}

function uploadCityPhoto(cityId, field) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;

    // Show uploading feedback
    const toastId = 'upload-toast';
    const toast = document.createElement('div');
    toast.id = toastId;
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e293b;color:white;padding:12px 20px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
    toast.textContent = '⏳ Uploading photo...';
    document.body.appendChild(toast);

    try {
      // Resize: cover = 1200×630, gallery = 800×600
      const isCover = field === 'cover_photo';
      const resized = await resizeImage(file, isCover ? 1200 : 800, isCover ? 630 : 600);

      // Upload to Supabase Storage
      const path = 'cities/' + cityId + '/' + field + '_' + Date.now() + '.jpg';
      const { error: upErr } = await sb.storage.from('city-photos').upload(path, resized, { upsert: true });
      if (upErr) throw upErr;

      // Get public URL
      const { data: urlData } = sb.storage.from('city-photos').getPublicUrl(path);
      const publicUrl = urlData.publicUrl;

      // Save to cities table
      const update = {};
      update[field] = publicUrl;
      const { error: dbErr } = await sb.from('cities').update(update).eq('id', cityId);
      if (dbErr) throw dbErr;

      toast.textContent = '✅ Photo uploaded!';
      setTimeout(() => toast.remove(), 1800);

      // Re-render city page
      render();
    } catch(e) {
      toast.textContent = '❌ Error: ' + e.message;
      setTimeout(() => toast.remove(), 3000);
    }
  };
  input.click();
}

  if (!confirm('Remove this photo?')) return;
  const update = {}; update[field] = null;
  await sb.from('cities').update(update).eq('id', cityId);

}

      { data: allResults },
      { data: allTourism }
    ] = await Promise.all([
      sb.from('cities').select('id, country_id'),
      sb.from('half_marathon_races').select('id, city_id'),
      sb.from('parkrun_locations').select('id, city_id'),
      sb.from('parkrun_results').select('location_id'),
      sb.from('tourism_entries').select('city_id')
    ]);

    const cities    = allCities    || [];
    const hmRaces   = allHM        || [];
    const locations = allLocations || [];
    const results   = allResults   || [];
    const tourismRows = allTourism || [];

    const { data: allHMResults } = await sb.from('half_marathon_results').select('race_id');
    const hmDoneRaceIds = new Set((allHMResults || []).map(r => r.race_id));

    const pkLocPerCity = {};
    locations.forEach(l => { pkLocPerCity[l.city_id] = (pkLocPerCity[l.city_id] || 0) + 1; });

    const pkDoneLocIds = new Set(results.map(r => r.location_id));
    const pkDonePerCity = {};
    locations.forEach(l => {
      if (pkDoneLocIds.has(l.id)) pkDonePerCity[l.city_id] = (pkDonePerCity[l.city_id] || 0) + 1;
    });

    const hmPerCity = {};
    const hmDonePerCity = {};
    hmRaces.forEach(r => {
      hmPerCity[r.city_id] = (hmPerCity[r.city_id] || 0) + 1;
      if (hmDoneRaceIds.has(r.id)) hmDonePerCity[r.city_id] = (hmDonePerCity[r.city_id] || 0) + 1;
    });

    const tourismPerCity = {};
    tourismRows.forEach(r => { tourismPerCity[r.city_id] = (tourismPerCity[r.city_id] || 0) + 1; });

    cities.forEach(c => {
      cityStats[c.id] = {
        hm: hmDonePerCity[c.id] || 0,
        hmTotal: hmPerCity[c.id] || 0,
        pk: pkDonePerCity[c.id] || 0,
        pkTotal: pkLocPerCity[c.id] || 0,
        tourism: tourismPerCity[c.id] || 0
      };
    });

    cities.forEach(c => {
      const cid = c.country_id;
      if (!countryStats[cid]) countryStats[cid] = { hm:0, hmTotal:0, pk:0, pkTotal:0, cities:0, citiesVisited:0, tourism:0 };
      const cs = cityStats[c.id];
      const cityVisited = cs.hm > 0 || cs.pk > 0 || cs.tourism > 0;
      if (cityVisited) countryStats[cid].citiesVisited += 1;
      countryStats[cid].cities   += 1;
      countryStats[cid].hm       += cs.hm;
      countryStats[cid].hmTotal  += cs.hmTotal;
      countryStats[cid].pk       += cs.pk;
      countryStats[cid].pkTotal  += cs.pkTotal;
      countryStats[cid].tourism  += cs.tourism;
    });

    if (countriesCache) {
      countriesCache.forEach(country => {
        const rid = country.region;
        if (!regionStats[rid]) regionStats[rid] = { hm:0, hmTotal:0, pk:0, pkTotal:0, cities:0, citiesVisited:0, tourism:0 };
        const cs = countryStats[country.id] || { hm:0, hmTotal:0, pk:0, pkTotal:0, cities:0, citiesVisited:0, tourism:0 };
        regionStats[rid].hm           += cs.hm;
        regionStats[rid].hmTotal      += cs.hmTotal;
        regionStats[rid].pk           += cs.pk;
        regionStats[rid].pkTotal      += cs.pkTotal;
        regionStats[rid].cities       += cs.cities;
        regionStats[rid].citiesVisited+= cs.citiesVisited;
        regionStats[rid].tourism      += cs.tourism;
      });
    }

    statsLoaded = true;
  })();

  await statsLoadingPromise;
  statsLoadingPromise = null;
}

function calcPct(totalId, posId, pctId) {
  const total = parseFloat(document.getElementById(totalId).value);
  const pos   = parseFloat(document.getElementById(posId).value);
  const el    = document.getElementById(pctId);
  if (total > 0 && pos > 0) el.value = ((pos / total) * 100).toFixed(2);
  else el.value = '';
}

}

  const date = document.getElementById('t-date').value || null;

  const link = document.getElementById('t-link').value.trim() || null;
  const errorEl = document.getElementById('tourism-form-error');
  const btn = document.getElementById('tourism-save-btn');

  if (!name) { errorEl.innerHTML = '<div class="form-error">Name is required.</div>'; return; }

  btn.disabled = true; btn.textContent = 'Saving...';

  const { error } = await sb.from('tourism_entries').insert({
    city_id: cityId, name, category,
    visit_date: status === 'visited' ? (date || new Date().toISOString().split('T')[0]) : date,

  if (error) {
    errorEl.innerHTML = '<div class="form-error">Error: ' + error.message + '</div>';

  delete tourismCache[cityId];

// PARKRUN WCA-STYLE RANKING TABLE
// ════════════════════════════════════════

// Loads ALL parkrun locations (optionally filtered by city) joined with their results,
// plus city/country/state info, and renders a flat sorted table.
// Converts 'YYYY-MM-DD' (ISO, from Supabase) to 'DD/MM/YYYY' for display only.
// Sorting/storage always stays in ISO format — only this function changes how it LOOKS.
// Convert flag emoji (e.g. 🇦🇺) to ISO-2 code (e.g. "au") for flagcdn.com
function flagEmojiToISO(emoji) {
  if (!emoji) return null;
  try {
    const cps = [...emoji].map(c => c.codePointAt(0));
    // Regional indicator letters: 0x1F1E6=A ... 0x1F1FF=Z
    const letters = cps.filter(cp => cp >= 0x1F1E6 && cp <= 0x1F1FF)
                       .map(cp => String.fromCharCode(cp - 0x1F1E6 + 65));
    if (letters.length === 2) return letters.join('').toLowerCase();
  } catch(e) {}
  return null;
}

function countryFlagImg(flagEmoji, name) {
  const iso = flagEmojiToISO(flagEmoji);
  if (!iso) return `<span class="square-flag">${flagEmoji}</span>`;
  return `<div class="square-flag-img-wrap">
    <img class="square-flag-img" src="https://flagcdn.com/w80/${iso}.png"
         srcset="https://flagcdn.com/w160/${iso}.png 2x"
         alt="${name}" loading="lazy"
         onerror="this.parentNode.innerHTML='<span style=\'font-size:36px;\'>${flagEmoji}</span>'">
  </div>`;
}

function toTitleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function formatDate(isoDate) {
  if (!isoDate) return '–';
  const parts = isoDate.split('-');
  if (parts.length !== 3) return isoDate;
  const [y, m, d] = parts;
  return `${d}/${m}/${y}`;
}

// Parses an "MM:SS" string to total seconds. Returns null if invalid/empty.
function parseTimeToSeconds(t) {
  if (!t) return null;
  const m = t.match(/^(\d+):(\d{2})$/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

// Given the 5 km split strings, returns { fastestIdx, slowestIdx } (0-4), or nulls if not enough data.
function getKmExtremes(splits) {
  const seconds = splits.map(parseTimeToSeconds);
  const validIdx = seconds.map((s, i) => s != null ? i : null).filter(i => i !== null);
  if (validIdx.length < 2) return { fastestIdx: null, slowestIdx: null };
  let fastestIdx = validIdx[0], slowestIdx = validIdx[0];
  validIdx.forEach(i => {
    if (seconds[i] < seconds[fastestIdx]) fastestIdx = i;
    if (seconds[i] > seconds[slowestIdx]) slowestIdx = i;
  });
  if (fastestIdx === slowestIdx) return { fastestIdx: null, slowestIdx: null }; // all equal, nothing to highlight
  return { fastestIdx, slowestIdx };
}

function kmCellClass(idx, extremes) {
  if (extremes.fastestIdx === idx) return 'pk-km-fast';
  if (extremes.slowestIdx === idx) return 'pk-km-slow';
  return '';
}

let pkCurrentFilters = { country: '', city: '', state: '', status: '' };

  const [
    { data: allCountries },

    { data: pkLocations },
    { data: pkResults },
    { data: hmRaces },
    { data: hmResults },
    { data: tourismEntries }
  ] = await Promise.all([
    sb.from('countries').select('id, visited'),
    sb.from('cities').select('id, country_id'),
    sb.from('parkrun_locations').select('id, city_id'),
    sb.from('parkrun_results').select('location_id'),
    sb.from('half_marathon_races').select('id, city_id'),
    sb.from('half_marathon_results').select('race_id'),
    sb.from('tourism_entries').select('city_id')
  ]);

  function setStatBox(prefix, total, done) {
    const t = total ?? 0;
    const d = Math.min(done ?? 0, t);
    const pct = t > 0 ? ((d / t) * 100).toFixed(2) : '0.00';
    document.getElementById('stat-' + prefix + '-total').textContent = t;
    document.getElementById('stat-' + prefix + '-done').textContent  = d;
    document.getElementById('stat-' + prefix + '-pend').textContent  = t - d;
    document.getElementById('stat-' + prefix + '-pct').textContent   = pct + '%';
  }

  const pkDoneLocIds = new Set((pkResults||[]).map(r => r.location_id));
  setStatBox('pk', (pkLocations||[]).length, pkDoneLocIds.size);

  const hmDoneRaceIds = new Set((hmResults||[]).map(r => r.race_id));
  setStatBox('hm', (hmRaces||[]).length, hmDoneRaceIds.size);

  const pkCityIds      = new Set((pkLocations||[]).map(r => r.city_id));
  const hmCityIds      = new Set((hmRaces||[]).map(r => r.city_id));
  const tourismCityIds = new Set((tourismEntries||[]).map(r => r.city_id));
  const visitedCityIds = new Set([
    ...[...(pkLocations||[])].filter(l => pkDoneLocIds.has(l.id)).map(l => l.city_id),
    ...[...(hmRaces||[])].filter(r => hmDoneRaceIds.has(r.id)).map(r => r.city_id),
    ...(tourismEntries||[]).map(r => r.city_id)
  ]);
  setStatBox('cities', (allCities||[]).length, visitedCityIds.size);

  const visitedCountryIds = new Set(
    (allCities||[]).filter(c => visitedCityIds.has(c.id)).map(c => c.country_id)
  );
  (allCountries||[]).filter(c => c.visited).forEach(c => visitedCountryIds.add(c.id));
  setStatBox('countries', (allCountries||[]).length, visitedCountryIds.size);
}

function go(level, val) {
  if (level === 'home')     state = { region:null, country:null, city:null, category:null, sub:null, parkrunLocation:null, globalView:null };
  if (level === 'region')   state = { region:val, country:null, city:null, category:null, sub:null, parkrunLocation:null, globalView:null };
  if (level === 'country')  { state.country = val; state.city=null; state.category=null; state.sub=null; state.parkrunLocation=null; state.globalView=null; }
  if (level === 'city')     { state.city = val; state.category=null; state.sub=null; state.parkrunLocation=null; }
  if (level === 'category') { state.category = val; state.sub=null; state.parkrunLocation=null; }
  if (level === 'sub')      { state.sub = val; state.parkrunLocation=null; }
  render();
}

function goDirectRun(sub) {
  state.category = 'run';
  state.sub = sub;
  state.parkrunLocation = null;
  render();
}

function goGlobalParkruns() {
  state = { region:null, country:null, city:null, category:null, sub:null, parkrunLocation:null, globalView:'parkruns' };
  render();
}

function goGlobalCities() {
  // TODO: implement all cities view
  alert('Coming soon!');
}

function goGlobalHalfMarathons() {
  state = { region:null, country:null, city:null, category:null, sub:null, parkrunLocation:null, globalView:'halfmarathons' };
  render();
}

function regionMeta(id) { return regionsCache.find(r => r.id === id); }
function countriesInRegion(id) { return countriesCache.filter(c => c.region === id); }

function updateBreadcrumb(ctx) {
  const bc = document.getElementById('breadcrumb');
  let parts = [`<span onclick="go('home')">World</span>`];
  if (state.globalView === 'parkruns') {
    parts.push(`<span class="sep">›</span><span class="current">All Parkruns</span>`);
    bc.innerHTML = parts.join(''); return;
  }
  if (state.globalView === 'halfmarathons') {
    parts.push(`<span class="sep">›</span><span class="current">All Half Marathons</span>`);
    bc.innerHTML = parts.join(''); return;
  }
  if (state.region !== null) {
    const r = regionMeta(state.region);
    parts.push(`<span class="sep">›</span>`);
    parts.push(state.country===null ? `<span class="current">${r.name}</span>` : `<span onclick="go('region','${state.region}')">${r.name}</span>`);
  }
  if (state.country !== null && ctx.country) {
    const c = ctx.country;
    parts.push(`<span class="sep">›</span>`);
    parts.push(state.city===null ? `<span class="current">${c.flag_emoji} ${c.name}</span>` : `<span onclick="go('country',${state.country})">${c.flag_emoji} ${c.name}</span>`);
  }
  if (state.city !== null && ctx.city) {
    parts.push(`<span class="sep">›</span>`);
    parts.push(state.category===null ? `<span class="current">${ctx.city.name}</span>` : `<span onclick="go('city',${state.city})">${ctx.city.name}</span>`);
  }
  if (state.category !== null && state.category !== 'run') {
    parts.push(`<span class="sep">›</span>`);
    parts.push(state.sub===null ? `<span class="current">Tourism</span>` : `<span onclick="go('category','tourism')">Tourism</span>`);
  }
  if (state.sub !== null) {
    const label = state.category === 'run'
      ? (state.sub === 'half_marathon' ? 'Half Marathons' : 'Parkruns')
      : tourismMeta[state.sub].name;
    parts.push(`<span class="sep">›</span>`);
    parts.push(`<span class="current">${label}</span>`);
  }
  bc.innerHTML = parts.join('');
}

function loadingHTML() {
  return `<div class="empty-state"><div class="es-icon">⏳</div><div class="es-text">Loading...</div></div>`;
}

function toTitleCase(str) {
  if (!str) return str;
  return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

function formatDate(isoDate) {
  if (!isoDate) return '–';
  const parts = isoDate.split('-');
  if (parts.length !== 3) return isoDate;
  const [y, m, d] = parts;
  return `${d}/${m}/${y}`;
}

function flagEmojiToISO(emoji) {
  if (!emoji) return null;
  try {
    const cps = [...emoji].map(c => c.codePointAt(0));
    const letters = cps.filter(cp => cp >= 0x1F1E6 && cp <= 0x1F1FF)
                       .map(cp => String.fromCharCode(cp - 0x1F1E6 + 65));
    if (letters.length === 2) return letters.join('').toLowerCase();
  } catch(e) {}
  return null;
}

function countryFlagImg(flagEmoji, name) {
  const iso = flagEmojiToISO(flagEmoji);
  if (!iso) return `<span class="square-flag">${flagEmoji}</span>`;
  return `<div class="square-flag-img-wrap">
    <img class="square-flag-img" src="https://flagcdn.com/w80/${iso}.png"
         srcset="https://flagcdn.com/w160/${iso}.png 2x"
         alt="${name}" loading="lazy"
         onerror="this.parentNode.innerHTML='<span style=\\'font-size:36px;\\'>${flagEmoji}</span>'">
  </div>`;
}

async function render() {
  const main = document.getElementById('main');
  main.innerHTML = loadingHTML();

  await loadRegionsAndCountries();
  await loadAllStats();

  // GLOBAL VIEW: All Half Marathons
  if (state.globalView === 'halfmarathons') {
    updateBreadcrumb({});
    main.innerHTML = `
      <div class="back-btn" onclick="go('home')">‹ Back to World</div>

        <div class="page-subtitle">Every half marathon you've run or planned, across all cities</div>
      </div>
      <div id="hm-stats-panel"></div>
      <div class="pk-filters" id="hm-filters-bar"></div>
      <div id="hm-table-container">Loading...</div>
    `;
    await renderHalfMarathonTable({ cityId: null });

  }

  // GLOBAL VIEW: All Parkruns hub
  if (state.globalView === 'parkruns') {
    updateBreadcrumb({});
    main.innerHTML = `

      <div class="page-header">
        <div class="page-title">🏃 All Parkruns</div>
        <div class="page-subtitle">Every parkrun location you've logged, across all cities</div>
      </div>
      <div id="pk-stats-panel"></div>
      <div class="pk-filters" id="pk-filters-bar"></div>
      <div id="pk-table-container">Loading...</div>
    `;
    await renderParkrunTable({ cityId: null });
    return;
  }

  // LEVEL 0: WORLD
  if (state.region === null) {
    updateBreadcrumb({});
    main.innerHTML = `
      <div class="page-header">
        <div class="page-title" style="font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;">🌍 World Explorer</div>
        <div class="page-subtitle">Select a region to explore countries, cities and adventures</div>
      </div>
      <div style="margin-bottom: 28px; display:flex; gap:16px; flex-wrap:wrap;">
        <button class="hero-cta-btn" style="flex:1;" onclick="goGlobalHalfMarathons()">🏅 All Half Marathons</button>
        <button class="hero-cta-btn" style="flex:1;" onclick="goGlobalParkruns()">🏃 All Parkruns</button>
        <button class="hero-cta-btn" style="flex:1;" onclick="goGlobalCities()">🏙️ All Cities</button>
      </div>
      <div class="region-grid">
        ${regionsCache.map(r => {
          const countriesHere = countriesInRegion(r.id);
          const visited = countriesHere.filter(c => {
            if (c.visited) return true;
            const cs = countryStats[c.id];
            return cs && (cs.hm > 0 || cs.pk > 0 || cs.tourism > 0);
          }).length;
          const rs = regionStats[r.id] || { hm: 0, hmTotal: 0, pk: 0, pkTotal: 0, cities: 0, citiesVisited: 0, tourism: 0 };
          return `
          <div class="region-card" style="--accent-color:${r.color}" onclick="go('region','${r.id}')">
            <div class="region-card-top">
              <div class="region-emoji">${r.emoji}</div>
            </div>
            <div class="region-card-name">${r.name}</div>
            <div class="region-card-meta">${countriesHere.length} countries &amp; territories total</div>
            <div class="region-card-tags">
              <span class="tag tag-travel">✓ ${visited} visited</span>
              ${rs.cities > 0 ? `<span class="tag" style="background:#f0f4ff;color:var(--blue);">🏙️ ${rs.citiesVisited||0}/${rs.cities} Cities</span>` : ''}
              ${rs.hmTotal > 0 ? `<span class="tag tag-run">🏅 ${rs.hm}/${rs.hmTotal} Half Marathons</span>` : ''}
              ${rs.pkTotal > 0 ? `<span class="tag tag-park">🏃 ${rs.pk}/${rs.pkTotal} Parkrun${rs.pkTotal===1?'':'s'}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    return;
  }

  const region = regionMeta(state.region);
  const regionCountries = countriesInRegion(state.region);

  // LEVEL 1: REGION → countries
  if (state.country === null) {
    updateBreadcrumb({});
    if (regionCountries.length === 0) {
      main.innerHTML = `
        <div class="back-btn" onclick="go('home')">‹ Back to World</div>
        <div class="page-header">
          <div class="page-title">${region.emoji} ${region.name}</div>
        </div>
        <div class="empty-state">
          <div class="es-icon">🗺️</div>
          <div class="es-text">No countries found in the database for this region.</div>
        </div>`;
      return;
    }
    const visitedCount = regionCountries.filter(c => {
      if (c.visited) return true;
      const cs = countryStats[c.id];
      return cs && (cs.hm > 0 || cs.pk > 0 || cs.tourism > 0);
    }).length;
    main.innerHTML = `
      <div class="back-btn" onclick="go('home')">‹ Back to World</div>
      <div class="page-header">
        <div class="page-title">${region.emoji} ${region.name}</div>
        <div class="page-subtitle">${visitedCount} of ${regionCountries.length} countries &amp; territories visited</div>
      </div>
      <div class="square-grid">
        ${regionCountries.map((c) => {
          const cs2 = countryStats[c.id] || {};
          const isVisited = c.visited || cs2.hm > 0 || cs2.pk > 0 || cs2.tourism > 0;
          const borderStyle = isVisited ? 'border-color:var(--blue);' : 'border-color:var(--border);';
          return `
          <div class="square-card" onclick="go('country',${c.id})" style="${borderStyle}">
            ${countryFlagImg(c.flag_emoji, c.name)}
            <div class="square-name" style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;">${c.name}</div>
            <div class="square-count" style="font-size:12px;color:var(--muted);margin-bottom:4px;">${c.capital || ''}</div>
            <div class="region-card-tags" style="justify-content:center; margin-top:8px; flex-wrap:wrap; gap:4px;">
              ${isVisited ? `<span class="tag tag-travel">✓ Visited</span>` : '<span class="tag" style="background:#f4f6f9;color:var(--muted);">Not visited</span>'}
              ${cs2.cities > 0 ? `<span class="tag" style="background:#f0f4ff;color:var(--blue);">🏙️ ${cs2.citiesVisited||0}/${cs2.cities} Cities</span>` : ''}
              ${cs2.hmTotal > 0 ? `<span class="tag tag-run">🏅 ${cs2.hm}/${cs2.hmTotal} Half Marathons</span>` : ''}
              ${cs2.pkTotal > 0 ? `<span class="tag tag-park">🏃 ${cs2.pk}/${cs2.pkTotal} Parkrun${cs2.pkTotal===1?'':'s'}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    return;
  }

  const country = countriesCache.find(c => c.id === state.country);
  const cities = await loadCities(country.id);

  // LEVEL 2: COUNTRY → cities (grouped by state, table layout)
  if (state.city === null) {
    updateBreadcrumb({ country });

    const stateMap = {};
    cities.forEach(city => {
      const s = city.state || '—';
      if (!stateMap[s]) stateMap[s] = [];
      stateMap[s].push(city);
    });

    const stateFlagMap = {
      'QLD': '🟡', 'NSW': '🔵', 'VIC': '💙', 'SA': '🔴', 'WA': '⚫', 'TAS': '🟢', 'ACT': '🌸', 'NT': '🟠',
      'California': '🐻', 'Texas': '⭐', 'New York': '🗽', 'Florida': '🌴',
      'Ontario': '🍁', 'British Columbia': '🍁', 'Quebec': '🍁', '—': '🏙️'
    };

    // Sort states by total items done desc, then total registered desc, then alpha
    const stateKeys = Object.keys(stateMap).sort(function(a, b) {
      function stateScore(key) {
        const stateCities = stateMap[key];
        let done = 0, total = 0;
        stateCities.forEach(function(city) {
          const cs = cityStats[city.id] || {};
          done  += (cs.hm||0) + (cs.pk||0) + (cs.tourism||0);
          total += (cs.hmTotal||0) + (cs.pkTotal||0);
        });
        return { done, total };
      }
      const sa = stateScore(a), sb2 = stateScore(b);
      if (sb2.done !== sa.done) return sb2.done - sa.done;
      if (sb2.total !== sa.total) return sb2.total - sa.total;
      return a.localeCompare(b);
    });

    function buildCityTable() {
      return stateKeys.map(function(stateKey) {
        const stateCities = stateMap[stateKey];
        const stateIcon = stateFlagMap[stateKey] || '📍';
        const label = stateKey === '—' ? 'No State' : stateKey;

        let stateHMDone = 0, stateHMTotal = 0, statePKDone = 0, statePKTotal = 0, stateTourism = 0;
        stateCities.forEach(function(city) {
          const cs = cityStats[city.id] || {};
          stateHMDone  += cs.hm || 0;
          stateHMTotal += cs.hmTotal || 0;
          statePKDone  += cs.pk || 0;
          statePKTotal += cs.pkTotal || 0;
          stateTourism += cs.tourism || 0;
        });

        const sortedCities = stateCities.slice().sort(function(a, b) {
          const ca = cityStats[a.id] || {}, cb = cityStats[b.id] || {};
          const doneA = (ca.hm||0) + (ca.pk||0) + (ca.tourism||0);
          const doneB = (cb.hm||0) + (cb.pk||0) + (cb.tourism||0);
          if (doneB !== doneA) return doneB - doneA;
          const totalA = (ca.hmTotal||0) + (ca.pkTotal||0);
          const totalB = (cb.hmTotal||0) + (cb.pkTotal||0);
          if (totalB !== totalA) return totalB - totalA;
          return a.name.localeCompare(b.name);
        });

        const rows = sortedCities.map(function(city) {
          const cs = cityStats[city.id] || { hm: 0, hmTotal: 0, pk: 0, pkTotal: 0, tourism: 0 };
          const totalDone = (cs.hm||0) + (cs.pk||0) + (cs.tourism||0);
          const allDone = (cs.hmTotal||0)+(cs.pkTotal||0) > 0 && cs.hm === cs.hmTotal && cs.pk === cs.pkTotal;
          const rowBg = allDone ? 'background:#edfaf3;' : '';
          const dot = totalDone > 0
            ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;flex-shrink:0;"></span>'
            : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#d03030;margin-right:6px;flex-shrink:0;"></span>';

          function cell(done, total) {
            if (total === 0) return '<td style="text-align:center;padding:10px 14px;color:var(--muted);">—</td>';
            const pct = ((done/total)*100).toFixed(0);
            const doneColor = done === 0 ? '#d03030' : 'var(--blue)';
            return '<td style="text-align:center;padding:10px 14px;">'
              + '<span style="color:' + doneColor + ';font-weight:700;">' + done + '</span>'
              + '<span style="color:var(--muted);font-weight:400;"> / </span>'
              + '<span style="font-weight:700;color:var(--text);">' + total + '</span>'
              + '<span style="font-size:11px;color:var(--muted);margin-left:5px;">(' + pct + '%)</span>'
              + '</td>';
          }

          const pop = city.population ? city.population.toLocaleString() : '—';
          return '<tr style="cursor:pointer;transition:background 0.12s;' + rowBg + '" onmouseover="this.style.background=\'#e6f7ef\'" onmouseout="this.style.background=\'' + (allDone ? '#edfaf3' : '') + '\'" onclick="go(\'city\',' + city.id + ')">'
            + '<td style="padding:10px 14px;font-weight:600;white-space:nowrap;display:flex;align-items:center;">' + dot + city.name + '</td>'
            + '<td style="text-align:center;padding:10px 14px;color:var(--muted);">' + pop + '</td>'
            + cell(cs.hm, cs.hmTotal)
            + cell(cs.pk, cs.pkTotal)
            + '<td style="text-align:center;padding:10px 14px;">'
            + (cs.tourism > 0 ? '<span style="color:var(--blue);font-weight:700;">' + cs.tourism + '</span>' : '<span style="color:var(--muted);">—</span>')
            + '</td>'
            + '</tr>';
        }).join('');

        function totalCell(done, total) {
          if (total === 0) return '<td style="text-align:center;padding:10px 14px;color:var(--muted);background:var(--bg);">—</td>';
          const pct = ((done/total)*100).toFixed(0);
          const doneColor = done === 0 ? '#d03030' : 'var(--blue)';
          return '<td style="text-align:center;padding:10px 14px;background:var(--bg);">'
            + '<span style="color:' + doneColor + ';font-weight:700;">' + done + '</span>'
            + '<span style="color:var(--muted);font-weight:400;"> / </span>'
            + '<span style="font-weight:700;color:var(--text);">' + total + '</span>'
            + '<span style="font-size:11px;color:var(--muted);margin-left:5px;">(' + pct + '%)</span>'
            + '</td>';
        }

        return '<div style="margin-bottom:32px;">'
          + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'
          + '<span style="font-size:18px;">' + stateIcon + '</span>'
          + '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;font-weight:700;">' + label + '</span>'
          + '<span style="color:var(--muted);font-size:13px;">(' + stateCities.length + ' ' + (stateCities.length===1?'city':'cities') + ')</span>'
          + '</div>'
          + '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);">'
          + '<table style="width:100%;border-collapse:collapse;font-size:14px;">'
          + '<thead><tr style="background:var(--bg);">'
          + '<th style="text-align:left;padding:10px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);border-bottom:2px solid var(--border);">City</th>'
          + '<th style="text-align:center;padding:10px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);border-bottom:2px solid var(--border);">Population</th>'
          + '<th style="text-align:center;padding:10px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--run);border-bottom:2px solid var(--border);">🏅 Half Marathon</th>'
          + '<th style="text-align:center;padding:10px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--parkrun);border-bottom:2px solid var(--border);">🏃 Parkrun</th>'
          + '<th style="text-align:center;padding:10px 14px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--travel);border-bottom:2px solid var(--border);">🧭 Tourism</th>'
          + '</tr></thead>'
          + '<tbody>' + rows + '</tbody>'
          + (stateCities.length > 1
            ? '<tfoot><tr style="background:var(--bg);border-top:2px solid var(--border);">'
              + '<td style="padding:10px 14px;font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);">TOTAL</td>'
              + '<td style="padding:10px 14px;background:var(--bg);"></td>'
              + totalCell(stateHMDone, stateHMTotal)
              + totalCell(statePKDone, statePKTotal)
              + '<td style="text-align:center;padding:10px 14px;background:var(--bg);font-weight:700;color:var(--blue);">' + (stateTourism || '—') + '</td>'
              + '</tr></tfoot>'
            : '')
          + '</table></div>'
          + '</div>';
      }).join('');
    }

    main.innerHTML = '<div class="back-btn" onclick="go(\'region\',\'' + state.region + '\')">‹ Back to ' + region.name + '</div>'
      + '<div class="page-header">'
      + '<div class="page-title">' + countryFlagImg(country.flag_emoji, country.name) + ' ' + country.name + '</div>'
      + '<div class="page-subtitle">Capital: ' + (country.capital || '—') + ' · ' + cities.length + ' ' + (cities.length === 1 ? 'city' : 'cities') + ' logged</div>'
      + '</div>'
      + '<div class="action-btn-row">'
      + '<button class="action-btn" onclick="openCityForm(' + country.id + ')">+ Add City</button>'
      + '</div>'
      + (cities.length === 0
        ? '<div class="empty-state"><div class="es-icon">📍</div><div class="es-text">No cities logged yet for ' + country.name + '.</div></div>'
        : buildCityTable());
    return;
  }

  const city = cities.find(c => c.id === state.city);
  const activities = await loadActivities(city.id);
  const tourism = await loadTourism(city.id);
  const cs = cityStats[city.id] || { hm: 0, hmTotal: 0, pk: 0, pkTotal: 0, tourism: 0 };

  // LEVEL 3: CITY — Travel guide dashboard
  if (state.category === null) {
    updateBreadcrumb({ country, city });

    const totalVisited = tourism.filter(t => t.visit_date).length;
    const totalTourism = tourism.length;

    main.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);">Loading...</div>';

    const { data: cityFresh } = await sb.from('cities').select('*').eq('id', city.id).single();
    const cityData = cityFresh || city;

    function qsBox(icon, done, total, label, color) {
      const pct = total > 0 ? (done/total*100) : 0;
      return '<div class="city-qs-box">'
        + '<div class="city-qs-icon">' + icon + '</div>'
        + '<div class="city-qs-val">'
        + '<span class="done" style="color:' + color + ';">' + done + '</span>'
        + '<span class="sep">/</span>'
        + '<span class="total">' + total + '</span>'
        + '</div>'
        + '<div class="city-qs-label">' + label + '</div>'
        + '<div class="city-progress-bar">'
        + '<div class="city-progress-fill" style="width:' + pct + '%;background:' + color + ';"></div>'
        + '</div></div>';
    }

    const allPhotoFields = ['cover_photo','photo_1','photo_2','photo_3','photo_4','photo_5'];
    const allPhotoLabels = ['Cover','Photo 2','Photo 3','Photo 4','Photo 5','Photo 6'];
    const gallerySlots = allPhotoFields.map((field, i) => {
      const url = cityData[field];
      const isCover = field === 'cover_photo';
      const inner = url
        ? '<img src="' + url + '" alt="' + allPhotoLabels[i] + '">'
          + '<div class="slot-overlay">'
          + (isCover ? '<span style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);color:white;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;">COVER</span>' : '')
          + '<button class="slot-btn" onclick="event.stopPropagation();uploadCityPhoto(' + cityData.id + ',\'' + field + '\')">Change</button>'
          + '<button class="slot-btn" style="color:#d03030;" onclick="event.stopPropagation();removeCityPhoto(' + cityData.id + ',\'' + field + '\')">Remove</button>'
          + '</div>'
        : '<div class="slot-empty"><span>📷</span><span>' + allPhotoLabels[i] + '</span></div>';
      return '<div class="city-photo-slot" onclick="uploadCityPhoto(' + cityData.id + ',\'' + field + '\')">'
        + inner + '</div>';
    }).join('');

    const pop = cityData.population ? '👥 ' + cityData.population.toLocaleString() : '';

    const descHTML = cityData.description
      ? '<div class="city-description" id="city-desc-text">' + cityData.description + '</div>'
        + '<button onclick="editCityDescription(' + cityData.id + ')" style="font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;margin-top:4px;">✏️ Edit description</button>'
      : '<button onclick="editCityDescription(' + cityData.id + ')" style="font-size:13px;color:var(--blue);background:var(--bg);border:1.5px dashed var(--blue);border-radius:8px;padding:8px 16px;cursor:pointer;">+ Add description</button>';

    main.innerHTML = '<div class="back-btn" onclick="go(\'country\',' + state.country + ')">‹ Back to ' + country.name + '</div>'
      + '<div class="city-info-block">'
      + '<div class="city-info-name">' + country.flag_emoji + ' ' + cityData.name + '</div>'
      + '<div class="city-info-meta">'
      + '<span>' + country.name + '</span>'
      + (cityData.state ? '<span style="color:var(--border);">·</span><span><b>' + cityData.state + '</b></span>' : '')
      + (pop ? '<span style="color:var(--border);">·</span><span>' + pop + '</span>' : '')
      + '</div>'
      + descHTML
      + '</div>'
      + '<div class="city-gallery-grid">' + gallerySlots + '</div>'
      + '<div class="city-quick-stats">'
      + qsBox('🏅', cs.hm, cs.hmTotal, 'Half Marathons', 'var(--run)')
      + qsBox('🏃', cs.pk, cs.pkTotal, 'Parkruns', 'var(--parkrun)')
      + qsBox('🧭', totalVisited, Math.max(totalTourism, 1), 'Places Visited', 'var(--green)')
      + '</div>'
      + '<div class="city-section-tabs">'
      + '<div class="city-tab active" id="tab-overview" onclick="showCityTab(\'overview\')">🗺️ Overview</div>'
      + '<div class="city-tab" id="tab-halfmarathons" onclick="showCityTab(\'halfmarathons\')">🏅 Half Marathons</div>'
      + '<div class="city-tab" id="tab-parkruns" onclick="showCityTab(\'parkruns\')">🏃 Parkruns</div>'
      + '<div class="city-tab" id="tab-tourism" onclick="showCityTab(\'tourism\')">🧭 Tourism</div>'
      + '</div>'
      + '<div id="city-tab-content"></div>';

    window._cityTabData = { city: cityData, country, tourism, cs, activities };
    showCityTab('overview');
    return;
  }

  // LEVEL 4: redirect to city tab view
  if (state.sub === null && state.category === 'tourism') {
    go('city', state.city);
    return;
  }

  // HALF MARATHON city view
  if (state.category === 'run' && state.sub === 'half_marathon') {
    main.innerHTML = `
      <div class="back-btn" onclick="go('city',${state.city})">‹ Back to ${city.name}</div>
      <div class="page-header">
        <div class="page-title">🏅 Half Marathons — ${city.name}</div>
      </div>
      <div class="action-btn-row">
        <button class="action-btn" style="background:var(--run);" onclick="openHalfMarathonRaceForm(${city.id})">+ Add Race</button>
      </div>
      <div id="hm-table-container">Loading...</div>
    `;
    await renderHalfMarathonTable({ cityId: city.id });
    return;
  }

  // PARKRUN city view
  if (state.category === 'run' && state.sub === 'parkrun') {
    main.innerHTML = `
      <div class="back-btn" onclick="go('city',${state.city})">‹ Back to ${city.name}</div>
      <div class="page-header">
        <div class="page-title">🏃 Parkruns — ${city.name}</div>
      </div>
      <div class="action-btn-row">
        <button class="action-btn" onclick="openParkrunLocationForm(${city.id})">+ Add Parkrun Location</button>
      </div>
      <div id="pk-table-container">Loading...</div>
    `;
    await renderParkrunTable({ cityId: city.id });
    return;
  }
}

async function renderParkrunTable({ cityId = null } = {}) {
  const container = document.getElementById('pk-table-container');
  if (!container) return;

  // Fetch locations (with city/state/country context) — global or city-scoped
  let locQuery = sb.from('parkrun_locations').select('*, cities(id, name, state, country_id)');
  if (cityId) locQuery = locQuery.eq('city_id', cityId);
  const { data: locations, error: locErr } = await locQuery;
  if (locErr) console.error('parkrun_locations (table) error', locErr);

  const locs = locations || [];
  if (locs.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">🏃</div>
        <div class="es-text">No parkrun locations logged yet${cityId ? ' in this city' : ''}.</div>
      </div>`;
    return;
  }

  // Fetch all results for these locations in one go
  const locIds = locs.map(l => l.id);
  const { data: results, error: resErr } = await sb.from('parkrun_results').select('*').in('location_id', locIds);
  if (resErr) console.error('parkrun_results (table) error', resErr);
  const allResults = results || [];

  // Build country lookup for global view (state already comes from city)
  const countryNames = {};
  if (!cityId && countriesCache) {
    countriesCache.forEach(c => countryNames[c.id] = c.name);
  }

  // Build flat rows: one row per result (done), plus one row per location with zero results (pending)
  let rows = [];
  locs.forEach(loc => {
    const locResults = allResults.filter(r => r.location_id === loc.id);
    const cityName = loc.cities ? loc.cities.name : '';
    const stateName = loc.cities ? loc.cities.state : '';
    const countryName = loc.cities ? countryNames[loc.cities.country_id] : '';

    if (locResults.length === 0) {
      rows.push({ done: false, loc, cityName, stateName, countryName, result: null });
    } else {
      // Use best result (fastest finish_time); fall back to most recent if no time
      function toSecsLocal(t) {
        if (!t) return Infinity;
        const p = t.split(':').map(Number);
        return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
      }
      const best = locResults.reduce((b, r) => toSecsLocal(r.finish_time) < toSecsLocal(b.finish_time) ? r : b);
      rows.push({ done: true, loc, cityName, stateName, countryName, result: best, runCount: locResults.length });
    }
  });

  pkAllRowsCache = rows;

  if (!cityId) {
    // GLOBAL VIEW: render stats panels + filters + filtered table
    renderParkrunStatsPanel(rows);
    renderParkrunFilters(rows);
    applyParkrunFiltersAndRender();
  } else {
    // CITY VIEW: simple table, no filters/stats (unchanged behaviour)
    renderParkrunTableHTML(rows, { showLocationCol: false });
  }
}

// ── STATS PANEL (global view only) ──
function renderParkrunStatsPanel(rows) {
  const panel = document.getElementById('pk-stats-panel');
  if (!panel) return;

  const totalLocations = rows.length;
  const doneRows       = rows.filter(r => r.done);
  const completedCount = doneRows.length;
  const pendingCount   = totalLocations - completedCount;
  const pctDone        = totalLocations > 0 ? ((completedCount / totalLocations) * 100).toFixed(2) : '0.00';

  function toSecs(t) {
    if (!t) return Infinity;
    const p = t.split(':').map(Number);
    return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
  }

  // ── Best parkrun ──
  let bestRow = null;
  doneRows.forEach(row => {
    const s = toSecs(row.result.finish_time);
    if (!bestRow || s < toSecs(bestRow.result.finish_time)) bestRow = row;
  });
  const bestTime = bestRow ? (bestRow.result.finish_time || '–') : '–';
  const bestPace = bestRow ? (bestRow.result.pace || '–') : '–';
  const bestDate = bestRow ? formatDate(bestRow.result.run_date || '') : '–';
  const bestName = bestRow ? toTitleCase(bestRow.loc.name) : '–';

  // ── Best km split overall ──
  let bestKmSecs = Infinity, bestKmLabel = '–', bestKmLoc = '–', bestKmDate = '–';
  doneRows.forEach(row => {
    const r = row.result;
    ['km1_time','km2_time','km3_time','km4_time','km5_time'].forEach((k, i) => {
      const t = r[k]; if (!t) return;
      const s = toSecs(t);
      if (s < bestKmSecs) {
        bestKmSecs  = s;
        bestKmLabel = 'km' + (i+1) + ' — ' + t;
        bestKmLoc   = toTitleCase(row.loc.name);
        bestKmDate  = formatDate(r.run_date || '');
      }
    });
  });

  // ── Time distribution: floor(mins) so 24:09 → 24 ──
  const timeBuckets = { '24': 0, '25': 0, '26': 0, '27': 0, '28': 0, '29': 0, '30+': 0 };
  doneRows.forEach(row => {
    const t = row.result.finish_time; if (!t) return;
    const p = t.split(':').map(Number);
    const floorMins = p[0]; // MM:SS — integer minutes
    if (floorMins <= 24)     timeBuckets['24']++;
    else if (floorMins === 25) timeBuckets['25']++;
    else if (floorMins === 26) timeBuckets['26']++;
    else if (floorMins === 27) timeBuckets['27']++;
    else if (floorMins === 28) timeBuckets['28']++;
    else if (floorMins === 29) timeBuckets['29']++;
    else                       timeBuckets['30+']++;
  });

  // ── Km pace distribution: floor(mins) so 4:59 → bucket 4 ──
  const kmBuckets = { '4': 0, '5': 0, '6': 0, '7': 0, '8+': 0 };
  doneRows.forEach(row => {
    const r = row.result;
    ['km1_time','km2_time','km3_time','km4_time','km5_time'].forEach(k => {
      const t = r[k]; if (!t) return;
      const p = t.split(':').map(Number);
      const floorMins = p[0];
      if (floorMins <= 4)     kmBuckets['4']++;
      else if (floorMins === 5) kmBuckets['5']++;
      else if (floorMins === 6) kmBuckets['6']++;
      else if (floorMins === 7) kmBuckets['7']++;
      else                      kmBuckets['8+']++;
    });
  });

  // ── State breakdown sorted by % done desc ──
  const stateLocMap = {}, stateDoneLocMap = {};
  rows.forEach(row => {
    const s = row.stateName || '—';
    if (!stateLocMap[s]) stateLocMap[s] = new Set();
    stateLocMap[s].add(row.loc.id);
    if (row.done) {
      if (!stateDoneLocMap[s]) stateDoneLocMap[s] = new Set();
      stateDoneLocMap[s].add(row.loc.id);
    }
  });
  const stateKeys = Object.keys(stateLocMap).sort((a, b) => {
    const ta = stateLocMap[a].size, tb = stateLocMap[b].size;
    const da = stateDoneLocMap[a] ? stateDoneLocMap[a].size : 0;
    const db = stateDoneLocMap[b] ? stateDoneLocMap[b].size : 0;
    const pctA = ta > 0 ? da/ta : 0, pctB = tb > 0 ? db/tb : 0;
    return pctB !== pctA ? pctB - pctA : tb - ta;
  });
  const stateTableRows = stateKeys.map(s => {
    const total = stateLocMap[s].size;
    const done  = stateDoneLocMap[s] ? stateDoneLocMap[s].size : 0;
    const pct   = total > 0 ? ((done/total)*100).toFixed(2) : '0.00';
    return `<tr>
      <td style="text-align:left;font-weight:600;padding:8px 12px">${s}</td>
      <td style="text-align:center;padding:8px 12px">${total}</td>
      <td style="text-align:center;padding:8px 12px;color:var(--green);font-weight:700">${done}</td>
      <td style="text-align:center;padding:8px 12px;color:#d03030;font-weight:700">${total-done}</td>
      <td style="text-align:center;padding:8px 12px;color:var(--blue);font-weight:700">${pct}%</td>
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div class="pk-stats-grid">
      <div class="pk-stat-box">
        <div class="pk-stat-value">${totalLocations}</div>
        <div class="pk-stat-label">Total Parkruns</div>
      </div>
      <div class="pk-stat-box">
        <div class="pk-stat-value pk-stat-green">${completedCount}</div>
        <div class="pk-stat-label">Completed</div>
      </div>
      <div class="pk-stat-box">
        <div class="pk-stat-value pk-stat-muted">${pendingCount}</div>
        <div class="pk-stat-label">Pending</div>
      </div>
      <div class="pk-stat-box">
        <div class="pk-stat-value pk-stat-blue">${pctDone}%</div>
        <div class="pk-stat-label">% Completed</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
      <div class="pk-stat-box" style="border-left:4px solid var(--green)">
        <div class="pk-mini-table-title" style="margin-bottom:10px">🏆 Best Parkrun</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:var(--green)">${bestTime}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">Pace: <b style="color:var(--text)">${bestPace}</b> · ${bestDate}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${bestName}</div>
      </div>
      <div class="pk-stat-box" style="border-left:4px solid var(--blue)">
        <div class="pk-mini-table-title" style="margin-bottom:10px">⚡ Best km Split</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--blue)">${bestKmSecs < Infinity ? bestKmLabel : '–'}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">${bestKmDate}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${bestKmLoc}</div>
      </div>
    </div>

    <div class="pk-mini-table-wrap" style="margin-bottom:20px">
      <div class="pk-mini-table-title">Breakdown by State</div>
      <table class="pk-mini-table" style="width:100%">
        <thead><tr>
          <th style="text-align:left;padding:8px 12px">State</th>
          <th style="text-align:center;padding:8px 12px">Total</th>
          <th style="text-align:center;padding:8px 12px;color:var(--green)">Done</th>
          <th style="text-align:center;padding:8px 12px;color:#d03030">Pending</th>
          <th style="text-align:center;padding:8px 12px;color:var(--blue)">% Done</th>
        </tr></thead>
        <tbody>${stateTableRows}</tbody>
      </table>
    </div>

    <div class="pk-mini-tables">
      <div class="pk-mini-table-wrap">
        <div class="pk-mini-table-title">Finish Time Distribution (min)</div>
        <table class="pk-mini-table">
          <thead><tr>${Object.keys(timeBuckets).map(k => `<th>${k}</th>`).join('')}</tr></thead>
          <tbody><tr>${Object.values(timeBuckets).map(v => `<td>${v}</td>`).join('')}</tr></tbody>
        </table>
      </div>
      <div class="pk-mini-table-wrap">
        <div class="pk-mini-table-title">Km Pace Distribution (min/km)</div>
        <table class="pk-mini-table">
          <thead><tr>${Object.keys(kmBuckets).map(k => `<th>${k}min/km</th>`).join('')}<th style="color:var(--blue)">Total</th></tr></thead>
          <tbody><tr>${Object.values(kmBuckets).map(v => `<td>${v}</td>`).join('')}<td style="color:var(--blue)">${completedCount * 5}</td></tr></tbody>
        </table>
      </div>
    </div>
  `;
}

// ── FILTERS (global view only) ──
function renderParkrunFilters(rows) {
  const filterEl = document.getElementById('pk-filters-bar');
  if (!filterEl) return;

  const countries = [...new Set(rows.map(r => r.countryName).filter(Boolean))].sort();
  const states = [...new Set(rows.map(r => r.stateName).filter(Boolean))].sort();
  const cities = [...new Set(rows.map(r => r.cityName).filter(Boolean))].sort();

  filterEl.innerHTML = `
    <select class="pk-filter-select" id="pk-filter-country" onchange="updatePkFilter('country', this.value)">
      <option value="">All Countries</option>
      ${countries.map(c => `<option value="${c}" ${pkCurrentFilters.country===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="pk-filter-select" id="pk-filter-state" onchange="updatePkFilter('state', this.value)">
      <option value="">All States</option>
      ${states.map(s => `<option value="${s}" ${pkCurrentFilters.state===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <select class="pk-filter-select" id="pk-filter-city" onchange="updatePkFilter('city', this.value)">
      <option value="">All Cities</option>
      ${cities.map(c => `<option value="${c}" ${pkCurrentFilters.city===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="pk-filter-select" id="pk-filter-status" onchange="updatePkFilter('status', this.value)">
      <option value="">All Statuses</option>
      <option value="done" ${pkCurrentFilters.status==='done'?'selected':''}>✓ Completed only</option>
      <option value="pending" ${pkCurrentFilters.status==='pending'?'selected':''}>○ Pending only</option>
    </select>
    ${(pkCurrentFilters.country || pkCurrentFilters.state || pkCurrentFilters.city || pkCurrentFilters.status) ?
      `<button class="btn-cancel" style="padding:8px 14px" onclick="clearPkFilters()">Clear filters</button>` : ''}
  `;
}

function updatePkFilter(key, value) {
  pkCurrentFilters[key] = value;
  applyParkrunFiltersAndRender();
  renderParkrunFilters(pkAllRowsCache); // re-render to update "Clear filters" visibility
}

function clearPkFilters() {
  pkCurrentFilters = { country: '', city: '', state: '', status: '' };
  applyParkrunFiltersAndRender();
  renderParkrunFilters(pkAllRowsCache);
}

function applyParkrunFiltersAndRender() {
  if (!pkAllRowsCache) return;
  let filtered = pkAllRowsCache;
  if (pkCurrentFilters.country) filtered = filtered.filter(r => r.countryName === pkCurrentFilters.country);
  if (pkCurrentFilters.state)   filtered = filtered.filter(r => r.stateName === pkCurrentFilters.state);
  if (pkCurrentFilters.city)    filtered = filtered.filter(r => r.cityName === pkCurrentFilters.city);
  if (pkCurrentFilters.status === 'done')    filtered = filtered.filter(r => r.done);
  if (pkCurrentFilters.status === 'pending') filtered = filtered.filter(r => !r.done);
  renderParkrunTableHTML(filtered, { showLocationCol: true });
}

// ── TABLE HTML RENDERER (shared by city view and global view) ──
function renderParkrunTableHTML(rows, { showLocationCol }) {
  const container = document.getElementById('pk-table-container');
  if (!container) return;

  // Sort: done rows by date (most recent first), then pending rows alphabetically
  const doneRows = rows.filter(r => r.done).sort((a, b) => (b.result.run_date || '').localeCompare(a.result.run_date || ''));
  const pendingRows = rows.filter(r => !r.done).sort((a, b) => a.loc.name.localeCompare(b.loc.name));
  const sortedRows = [...doneRows, ...pendingRows];

  if (sortedRows.length === 0) {
    container.innerHTML = `
      <div class="empty-state">

        <div class="es-text">No parkruns match the selected filters.</div>

    <div class="table-wrap">

          <tr>
            <th></th>
            <th>Parkrun</th>
            ${showLocationCol ? `<th>State</th><th class="pk-th-left">City</th>` : ''}
            <th>Date</th>
            <th style="border-left:2px solid var(--border);color:#b45309">Time</th>
            <th style="color:#b45309">Pace</th>
            <th style="color:#b45309;border-right:2px solid var(--border)">Elev.</th>
            <th style="border-left:2px solid var(--border)">Km1</th><th>Km2</th><th>Km3</th><th>Km4</th><th style="border-right:2px solid var(--border)">Km5</th>
            <th style="border-left:2px solid var(--border);color:#7c3aed">Runners</th>
            <th style="color:#7c3aed">Pos</th>
            <th style="color:#7c3aed;border-right:2px solid var(--border)">Top%</th>
            <th style="border-left:2px solid var(--border);color:#0d9488">Men</th>
            <th style="color:#0d9488">Pos ♂</th>
            <th style="color:#0d9488;border-right:2px solid var(--border)">Top% ♂</th>
            <th style="border-left:2px solid var(--border);color:#ea580c">Cat</th>
            <th style="color:#ea580c">Cat Size</th>
            <th style="color:#ea580c">Pos Cat</th>
            <th style="color:#ea580c;border-right:2px solid var(--border)">Top% Cat</th>
            <th style="color:#555">Age Grade</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${sortedRows.map(row => {
            const r = row.result;
            const rowClass = row.done ? 'pk-done' : 'pk-pending';
            const dot = row.done
              ? `<span class="pk-status-dot pk-status-done"></span>`
              : `<span class="pk-status-dot pk-status-pending"></span>`;
            const kmExtremes = row.done

function maskTime(input) {
  // Strip everything except digits, then re-insert the colon as MM:SS
  let digits = input.value.replace(/\D/g, '');
  if (digits.length > 4) digits = digits.slice(0, 4);
  if (digits.length <= 2) {
    input.value = digits;
  } else {
    input.value = digits.slice(0, digits.length - 2) + ':' + digits.slice(-2);
  }
}

function calcPace() {
  const timeStr = document.getElementById('r-time').value.trim();
  const paceEl = document.getElementById('r-pace');
  const match = timeStr.match(/^(\d+):(\d{2})$/);
  if (!match) { paceEl.value = ''; return; }
  const totalSeconds = parseInt(match[1]) * 60 + parseInt(match[2]);
  const paceSeconds = totalSeconds / 5; // parkrun is 5km
  const paceMin = Math.floor(paceSeconds / 60);
  const paceSec = Math.round(paceSeconds % 60);
  const paceSecStr = paceSec < 10 ? '0' + paceSec : '' + paceSec;
  paceEl.value = `${paceMin}:${paceSecStr}`;
}

function calcPct(totalId, posId, pctId) {
  const total = parseFloat(document.getElementById(totalId).value);
  const pos = parseFloat(document.getElementById(posId).value);
  const pctEl = document.getElementById(pctId);
  if (!total || !pos || total <= 0) { pctEl.value = ''; return; }
  // "Top X% of the field" — e.g. total 100, position 10 => you beat 90 people => top 90%
  const pct = ((total - pos) / total) * 100;
  pctEl.value = pct.toFixed(2);
}
