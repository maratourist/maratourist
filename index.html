let hmAllRowsCache = null;
let hmCurrentFilters = { country: '', state: '', city: '', status: '' };

async function renderHalfMarathonTable({ cityId }) {
  // Fetch all races (global or filtered by city)
  let racesQuery = sb.from('half_marathon_races').select('*, cities(id, name, state, country_id, countries(id, name, flag_emoji))');
  if (cityId) racesQuery = racesQuery.eq('city_id', cityId);
  const { data: races, error: rErr } = await racesQuery.order('name');
  if (rErr) { console.error(rErr); return; }

  // Fetch best result per race (most recent run_date)
  const raceIds = (races || []).map(r => r.id);
  let results = [];
  if (raceIds.length > 0) {
    const { data: res } = await sb.from('half_marathon_results').select('*').in('race_id', raceIds).order('run_date', { ascending: false });
    results = res || [];
  }

  // Map raceId -> best result (most recent)
  const bestResult = {};
  results.forEach(r => {
    if (!bestResult[r.race_id]) bestResult[r.race_id] = r;
  });

  // Build rows
  hmAllRowsCache = (races || []).map(race => {
    const city = race.cities || {};
    const country = city.countries || {};
    return {
      race,
      result: bestResult[race.id] || {},
      done: !!bestResult[race.id],
      cityName: city.name || '',
      stateName: city.state || '',
      countryName: country.name || '',
      countryFlag: country.flag_emoji || ''
    };
  });

  // Stats panel (global view only)
  const statsPanel = document.getElementById('hm-stats-panel');
  if (statsPanel) renderHalfMarathonStatsPanel(hmAllRowsCache);

  // Filters (global view only)
  const filtersBar = document.getElementById('hm-filters-bar');
  if (filtersBar) renderHMFilters(hmAllRowsCache);

  renderHalfMarathonTableHTML(hmAllRowsCache, { showLocationCol: !cityId });
}

// ════════════════════════════════════════
// HALF MARATHON — STATS PANEL
// ════════════════════════════════════════
function renderHalfMarathonStatsPanel(rows) {
  const panel = document.getElementById('hm-stats-panel');
  if (!panel) return;

  const totalRaces     = rows.length;
  const doneRows       = rows.filter(r => r.done);
  const completedCount = doneRows.length;
  const pendingCount   = totalRaces - completedCount;
  const pctDone        = totalRaces > 0 ? ((completedCount / totalRaces) * 100).toFixed(2) : '0.00';

  // ── Best race ──
  function toSecs(t) {
    if (!t) return Infinity;
    const p = t.split(':').map(Number);
    return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
  }
  let bestRow = null;
  doneRows.forEach(row => {
    const s = toSecs(row.result.finish_time);
    if (!bestRow || s < toSecs(bestRow.result.finish_time)) bestRow = row;
  });
  const bestTime  = bestRow ? (bestRow.result.finish_time || '–') : '–';
  const bestPace  = bestRow ? (bestRow.result.pace || '–') : '–';
  const bestDate  = bestRow ? formatDate(bestRow.result.run_date || '') : '–';
  const bestRace  = bestRow ? toTitleCase(bestRow.race.name) : '–';

  // ── Best km split overall (fastest single km across all results) ──
  let bestKmTime = Infinity, bestKmLabel = '–', bestKmRace = '–', bestKmDate = '–';
  doneRows.forEach(row => {
    const r = row.result;
    for (let i = 1; i <= 21; i++) {
      const t = r['km' + i + '_time'];
      if (!t) continue;
      const s = toSecs(t);
      if (s < bestKmTime) {
        bestKmTime  = s;
        bestKmLabel = 'km' + i + ' — ' + t;
        bestKmRace  = toTitleCase(row.race.name);
        bestKmDate  = formatDate(r.run_date || '');
      }
    }
  });

  // ── State breakdown sorted by % done desc ──
  const stateLocMap = {}, stateDoneLocMap = {};
  rows.forEach(row => {
    const s = row.stateName || '—';
    if (!stateLocMap[s]) stateLocMap[s] = new Set();
    stateLocMap[s].add(row.race.id);
    if (row.done) {
      if (!stateDoneLocMap[s]) stateDoneLocMap[s] = new Set();
      stateDoneLocMap[s].add(row.race.id);
    }
  });
  const stateKeys = Object.keys(stateLocMap).sort((a, b) => {
    const ta = stateLocMap[a].size, tb = stateLocMap[b].size;
    const da = stateDoneLocMap[a] ? stateDoneLocMap[a].size : 0;
    const db = stateDoneLocMap[b] ? stateDoneLocMap[b].size : 0;
    const pctA = ta > 0 ? da/ta : 0, pctB = tb > 0 ? db/tb : 0;
    return pctB !== pctA ? pctB - pctA : tb - ta;
  });
  const stateTableRows = stateKeys.map(s => {
    const total = stateLocMap[s].size;
    const done  = stateDoneLocMap[s] ? stateDoneLocMap[s].size : 0;
    const pct   = total > 0 ? ((done/total)*100).toFixed(2) : '0.00';
    return '<tr>'
      + '<td style="text-align:left;font-weight:600;padding:8px 12px">' + s + '</td>'
      + '<td style="text-align:center;padding:8px 12px">' + total + '</td>'
      + '<td style="text-align:center;padding:8px 12px;color:var(--green);font-weight:700">' + done + '</td>'
      + '<td style="text-align:center;padding:8px 12px;color:#d03030;font-weight:700">' + (total-done) + '</td>'
      + '<td style="text-align:center;padding:8px 12px;color:var(--blue);font-weight:700">' + pct + '%</td>'
      + '</tr>';
  }).join('');

  // ── Finish time buckets (HH:MM ranges) ──
  const timeBuckets = { '<1:50': 0, '1:50-1:59': 0, '2:00-2:09': 0, '2:10-2:19': 0, '2:20+': 0 };
  doneRows.forEach(row => {
    const s = toSecs(row.result.finish_time);
    if (s === Infinity) return;
    const mins = s / 60;
    if (mins < 110)      timeBuckets['<1:50']++;
    else if (mins < 120) timeBuckets['1:50-1:59']++;
    else if (mins < 130) timeBuckets['2:00-2:09']++;
    else if (mins < 140) timeBuckets['2:10-2:19']++;
    else                 timeBuckets['2:20+']++;
  });

  // ── Km pace buckets (min/km across all km splits) ──
  const kmBuckets = { '4': 0, '5': 0, '6': 0, '7': 0, '8+': 0 };
  doneRows.forEach(row => {
    const r = row.result;
    for (let i = 1; i <= 21; i++) {
      const t = r['km' + i + '_time'];
      if (!t) continue;
      const p = t.split(':').map(Number);
      const floorMins = p[0];
      if (floorMins <= 4)       kmBuckets['4']++;
      else if (floorMins === 5) kmBuckets['5']++;
      else if (floorMins === 6) kmBuckets['6']++;
      else if (floorMins === 7) kmBuckets['7']++;
      else                      kmBuckets['8+']++;
    }
  });

  panel.innerHTML =
    // ── Top stats grid ──
    '<div class="hm-stats-grid">'
    + '<div class="hm-stat-box"><div class="hm-stat-value">' + totalRaces + '</div><div class="hm-stat-label">Total Races</div></div>'
    + '<div class="hm-stat-box"><div class="hm-stat-value" style="color:var(--green)">' + completedCount + '</div><div class="hm-stat-label">Completed</div></div>'
    + '<div class="hm-stat-box"><div class="hm-stat-value" style="color:#d03030">' + pendingCount + '</div><div class="hm-stat-label">Pending</div></div>'
    + '<div class="hm-stat-box"><div class="hm-stat-value hm-stat-green">' + pctDone + '%</div><div class="hm-stat-label">% Done</div></div>'
    + '</div>'

    // ── Best race highlight ──
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">'
    + '<div class="hm-stat-box" style="border-left:4px solid var(--green)">'
    + '<div class="pk-mini-table-title" style="margin-bottom:10px">🏆 Best Time</div>'
    + '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:700;color:var(--green)">' + bestTime + '</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-top:4px">Pace: <b style="color:var(--text)">' + bestPace + '</b> · ' + bestDate + '</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + bestRace + '</div>'
    + '</div>'
    + '<div class="hm-stat-box" style="border-left:4px solid var(--blue)">'
    + '<div class="pk-mini-table-title" style="margin-bottom:10px">⚡ Best km Split</div>'
    + '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;font-weight:700;color:var(--blue)">' + (bestKmTime < Infinity ? bestKmLabel : '–') + '</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-top:4px">' + bestKmDate + '</div>'
    + '<div style="font-size:12px;color:var(--muted);margin-top:2px">' + bestKmRace + '</div>'
    + '</div>'
    + '</div>'

    // ── State breakdown ──
    + (stateKeys.length > 0
      ? '<div class="pk-mini-table-wrap" style="margin-bottom:20px">'
        + '<div class="pk-mini-table-title">Breakdown by State</div>'
        + '<table class="pk-mini-table" style="width:100%">'
        + '<thead><tr>'
        + '<th style="text-align:left;padding:8px 12px">State</th>'
        + '<th style="text-align:center;padding:8px 12px">Total</th>'
        + '<th style="text-align:center;padding:8px 12px;color:var(--green)">Done</th>'
        + '<th style="text-align:center;padding:8px 12px;color:#d03030">Pending</th>'
        + '<th style="text-align:center;padding:8px 12px;color:var(--blue)">% Done</th>'
        + '</tr></thead>'
        + '<tbody>' + stateTableRows + '</tbody>'
        + '</table></div>'
      : '')

    // ── Mini distribution tables ──
    + '<div class="pk-mini-tables">'
    + '<div class="pk-mini-table-wrap"><div class="pk-mini-table-title">Finish Time Distribution</div>'
    + '<table class="pk-mini-table"><thead><tr>'
    + Object.keys(timeBuckets).map(k => '<th>' + k + '</th>').join('')
    + '</tr></thead><tbody><tr>'
    + Object.values(timeBuckets).map(v => '<td>' + v + '</td>').join('')
    + '</tr></tbody></table></div>'
    + '<div class="pk-mini-table-wrap"><div class="pk-mini-table-title">Km Pace Distribution (min/km)</div>'
    + '<table class="pk-mini-table"><thead><tr>'
    + Object.keys(kmBuckets).map(k => '<th>' + k + 'min/km</th>').join('')
    + '</tr></thead><tbody><tr>'
    + Object.values(kmBuckets).map(v => '<td>' + v + '</td>').join('')
    + '</tr></tbody></table></div>'
    + '</div>';
}

function renderHMFilters(rows) {
  const filterEl = document.getElementById('hm-filters-bar');
  if (!filterEl) return;
  const countries = [...new Set(rows.map(r => r.countryName).filter(Boolean))].sort();
  const states    = [...new Set(rows.map(r => r.stateName).filter(Boolean))].sort();
  const cities    = [...new Set(rows.map(r => r.cityName).filter(Boolean))].sort();
  filterEl.innerHTML = `
    <select class="pk-filter-select" onchange="updateHMFilter('country', this.value)">
      <option value="">All Countries</option>
      ${countries.map(c => `<option value="${c}" ${hmCurrentFilters.country===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="pk-filter-select" onchange="updateHMFilter('state', this.value)">
      <option value="">All States</option>
      ${states.map(s => `<option value="${s}" ${hmCurrentFilters.state===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <select class="pk-filter-select" onchange="updateHMFilter('city', this.value)">
      <option value="">All Cities</option>
      ${cities.map(c => `<option value="${c}" ${hmCurrentFilters.city===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <select class="pk-filter-select" onchange="updateHMFilter('status', this.value)">
      <option value="">All Statuses</option>
      <option value="done" ${hmCurrentFilters.status==='done'?'selected':''}>✓ Completed only</option>
      <option value="pending" ${hmCurrentFilters.status==='pending'?'selected':''}>○ Pending only</option>
    </select>
    ${(hmCurrentFilters.country||hmCurrentFilters.state||hmCurrentFilters.city||hmCurrentFilters.status)
      ? `<button class="btn-cancel" style="padding:8px 14px" onclick="clearHMFilters()">Clear filters</button>` : ''}
  `;
}

function updateHMFilter(key, value) {
  hmCurrentFilters[key] = value;
  applyHMFiltersAndRender();
  renderHMFilters(hmAllRowsCache);
}

function clearHMFilters() {
  hmCurrentFilters = { country: '', state: '', city: '', status: '' };
  applyHMFiltersAndRender();
  renderHMFilters(hmAllRowsCache);
}

function applyHMFiltersAndRender() {
  if (!hmAllRowsCache) return;
  let filtered = hmAllRowsCache;
  if (hmCurrentFilters.country) filtered = filtered.filter(r => r.countryName === hmCurrentFilters.country);
  if (hmCurrentFilters.state)   filtered = filtered.filter(r => r.stateName === hmCurrentFilters.state);
  if (hmCurrentFilters.city)    filtered = filtered.filter(r => r.cityName === hmCurrentFilters.city);
  if (hmCurrentFilters.status === 'done')    filtered = filtered.filter(r => r.done);
  if (hmCurrentFilters.status === 'pending') filtered = filtered.filter(r => !r.done);
  renderHalfMarathonTableHTML(filtered, { showLocationCol: true });
}

// Sum consecutive km splits (MM:SS or H:MM:SS) and return formatted time
function sumKmSplits(r, from, to) {
  let totalSecs = 0;
  let hasAny = false;
  for (let i = from; i <= to; i++) {
    const t = r['km' + i + '_time'];
    if (!t) continue;
    const p = t.split(':').map(Number);
    totalSecs += p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
    hasAny = true;
  }
  if (!hasAny) return '–';
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

function hmKmCellClass(idx, extremes) {
  if (extremes.fastestIdx === idx) return 'hm-km-fast';
  if (extremes.slowestIdx === idx) return 'hm-km-slow';
  return '';
}

function getHMKmExtremes(splits) {
  const valid = splits.map((s, i) => {
    if (!s) return null;
    const p = s.split(':').map(Number);
    return { idx: i, secs: p[0]*60 + (p[1]||0) };
  }).filter(Boolean);
  if (valid.length < 2) return { fastestIdx: null, slowestIdx: null };
  const fastest = valid.reduce((a, b) => a.secs < b.secs ? a : b);
  const slowest = valid.reduce((a, b) => a.secs > b.secs ? a : b);
  return { fastestIdx: fastest.idx, slowestIdx: slowest.idx };
}

async function submitHalfMarathonRaceForm(cityId) {
  const rawName = document.getElementById('hmrace-name').value.trim();
  const name = rawName.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  const errorEl = document.getElementById('hmrace-form-error');
  const btn = document.getElementById('hmrace-save-btn');
  if (!name) { errorEl.innerHTML = '<div class="form-error">Race name is required.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Saving...';
  const { error } = await sb.from('half_marathon_races').insert({ city_id: cityId, name });
  if (error) {

function calcHMPace() {
  const timeStr = document.getElementById('hmr-time').value.trim();
  const paceEl = document.getElementById('hmr-pace');
  // Accept H:MM:SS or MM:SS
  const m3 = timeStr.match(/^(\d+):(\d{2}):(\d{2})$/);
  const m2 = timeStr.match(/^(\d+):(\d{2})$/);
  let totalSeconds = null;
  if (m3) totalSeconds = parseInt(m3[1])*3600 + parseInt(m3[2])*60 + parseInt(m3[3]);
  else if (m2) totalSeconds = parseInt(m2[1])*60 + parseInt(m2[2]);
  if (!totalSeconds) { paceEl.value = ''; return; }
  const paceSeconds = totalSeconds / 21.0975;
  const paceMin = Math.floor(paceSeconds / 60);
  const paceSec = Math.round(paceSeconds % 60);
  paceEl.value = paceMin + ':' + (paceSec < 10 ? '0' : '') + paceSec;
}

function maskTimeHM(input) {
  // Allow H:MM:SS or MM:SS
  let digits = input.value.replace(/\D/g,'');
  if (digits.length <= 4) {
    if (digits.length <= 2) input.value = digits;
    else input.value = digits.slice(0, digits.length-2) + ':' + digits.slice(-2);
  } else if (digits.length <= 6) {
    input.value = digits.slice(0,digits.length-4) + ':' + digits.slice(-4,-2) + ':' + digits.slice(-2);
  }
}

async function submitHalfMarathonResultForm(raceId) {
  const val = id => document.getElementById(id).value.trim();
  const numOrNull = id => { const v = val(id); return v === '' ? null : parseFloat(v); };
  const intOrNull = id => { const v = val(id); return v === '' ? null : parseInt(v); };
  const strOrNull = id => { const v = val(id); return v === '' ? null : v; };

  const date = val('hmr-date');
  const time = val('hmr-time');
  const errorEl = document.getElementById('hmresult-form-error');
  const btn = document.getElementById('hmresult-save-btn');

  if (!date || !time) {
    errorEl.innerHTML = '<div class="form-error">Date and Time are required.</div>';
    return;
  }

  btn.disabled = true; btn.textContent = 'Saving...';

  const { error } = await sb.from('half_marathon_results').insert({
    race_id: raceId,
    run_date: date,
    finish_time: time,
    pace: strOrNull('hmr-pace'),
    elevation_m: numOrNull('hmr-elevation'),
    km1_time: strOrNull('hmr-km1'),
    km2_time: strOrNull('hmr-km2'),
    km3_time: strOrNull('hmr-km3'),
    km4_time: strOrNull('hmr-km4'),
    km5_time: strOrNull('hmr-km5'),
    km6_time: strOrNull('hmr-km6'),
    km7_time: strOrNull('hmr-km7'),
    km8_time: strOrNull('hmr-km8'),
    km9_time: strOrNull('hmr-km9'),
    km10_time: strOrNull('hmr-km10'),
    km11_time: strOrNull('hmr-km11'),
    km12_time: strOrNull('hmr-km12'),
    km13_time: strOrNull('hmr-km13'),
    km14_time: strOrNull('hmr-km14'),
    km15_time: strOrNull('hmr-km15'),
    km16_time: strOrNull('hmr-km16'),
    km17_time: strOrNull('hmr-km17'),
    km18_time: strOrNull('hmr-km18'),
    km19_time: strOrNull('hmr-km19'),
    km20_time: strOrNull('hmr-km20'),
    km21_time: strOrNull('hmr-km21'),
    total_runners: intOrNull('hmr-total'),
    my_position: intOrNull('hmr-pos'),
    my_position_pct: numOrNull('hmr-pos-pct'),
    total_men: intOrNull('hmr-total-men'),
    my_position_men: intOrNull('hmr-pos-men'),
    my_position_men_pct: numOrNull('hmr-pos-men-pct'),
    age_category: strOrNull('hmr-age-cat'),
    total_age_category: intOrNull('hmr-total-cat'),
    my_position_age_category: intOrNull('hmr-pos-cat'),
    my_position_age_category_pct: numOrNull('hmr-pos-cat-pct'),
    age_grade: numOrNull('hmr-age-grade')
  });

  if (error) {
    errorEl.innerHTML = '<div class="form-error">Error: ' + error.message + '</div>';
    btn.disabled = false; btn.textContent = 'Save Result'; return;
  }

  delete hmResultsCache[raceId];
  statsLoaded = false;
  closeModal(); render(); loadHeaderStats();
}
